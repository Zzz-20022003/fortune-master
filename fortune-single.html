<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>八字命理大师</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #ffd700;
            --gold-light: #ffec8b;
            --gold-dark: #b8860b;
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --bg-hover: #21262d;
            --border-color: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
            min-height: 100vh;
            color: var(--text-primary);
            padding-bottom: 80px;
        }
        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 25px 0 20px;
            background: linear-gradient(135deg, rgba(255,215,0,0.1) 0%, transparent 70%);
            border-radius: 0 0 30px 30px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255,215,0,0.3);
            font-weight: 700;
            letter-spacing: 3px;
        }
        .header p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
            letter-spacing: 2px;
        }
        .nav-tabs {
            display: flex;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 5px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .nav-tab {
            flex: 1;
            text-align: center;
            padding: 12px 8px;
            border-radius: 12px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            color: var(--text-secondary);
        }
        .nav-tab.active {
            background: linear-gradient(135deg, var(--gold) 0%, #ff9500 100%);
            color: #0d1117;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255,215,0,0.3);
            transform: translateY(-1px);
        }
        .nav-tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            transition: left 0.5s;
        }
        .nav-tab.active::before {
            left: 100%;
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            padding-left: 12px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(255,215,0,0.1), 0 0 20px rgba(255,215,0,0.1);
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--gold) 0%, #ff9500 100%);
            color: #0d1117;
            box-shadow: 0 6px 20px rgba(255,215,0,0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255,215,0,0.4);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .btn-secondary:hover {
            background: var(--bg-hover);
            border-color: var(--gold);
        }
        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,2);
            transition: all 0.3s;
        }
        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,3);
        }
        .result-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .result-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(180deg, var(--gold) 0%, #ff9500 100%);
            border-radius: 2px;
        }
        .result-content {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-primary);
        }
        .bazi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 15px;
        }
        .bazi-cell {
            text-align: center;
            padding: 15px 10px;
            background: linear-gradient(135deg, rgba(255,215,0,0.05) 0%, transparent 100%);
            border: 1px solid rgba(255,215,0,0.1);
            border-radius: 12px;
            transition: all 0.3s;
        }
        .bazi-cell:hover {
            background: rgba(255,215,0,0.1);
            transform: scale(1.05);
        }
        .bazi-tian {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .bazi-di {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .wuxing-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 8px;
        }
        .wuxing-tag.mu, .wuxing-tag.木 { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); color: #fff; }
        .wuxing-tag.huo, .wuxing-tag.火 { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: #fff; }
        .wuxing-tag.tu, .wuxing-tag.土 { background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%); color: #1f2937; }
        .wuxing-tag.jin, .wuxing-tag.金 { background: linear-gradient(135deg, #9ca3af 0%, #6b7280 100%); color: #fff; }
        .wuxing-tag.shui, .wuxing-tag.水 { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: #fff; }
        .guagua-container {
            text-align: center;
            padding: 30px 20px;
        }
        .guagua-display {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
            border: 2px solid rgba(255,215,0,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s;
            cursor: pointer;
            position: relative;
        }
        .guagua-display:hover {
            transform: scale(1.05);
            border-color: var(--gold);
            box-shadow: 0 0 40px rgba(255,215,0,0.3);
        }
        .guagua-display::before {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            border: 1px dashed rgba(255,215,0,0.3);
        }
        .guagua-symbol {
            font-size: 72px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
        }
        .today-luck {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 15px;
        }
        .luck-item {
            text-align: center;
            padding: 18px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            transition: all 0.3s;
        }
        .luck-item:hover {
            border-color: var(--gold);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255,215,0,0.1);
        }
        .luck-value {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold) 0%, #ff9500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .luck-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }
        .number-analysis {
            margin-top: 15px;
        }
        .number-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.3s;
        }
        .number-row:hover {
            background: rgba(255,215,0,0.03);
            padding-left: 10px;
            border-radius: 8px;
        }
        .number-row:last-child {
            border-bottom: none;
        }
        .number-label {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .number-value {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 14px;
        }
        .shishen-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            overflow: hidden;
        }
        .shishen-table th, .shishen-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
        }
        .shishen-table th {
            background: rgba(255,215,0,0.05);
            color: var(--gold);
            font-weight: 600;
        }
        .shishen-table tr:last-child td {
            border-bottom: none;
        }
        .shishen-table tr:hover {
            background: rgba(255,215,0,0.03);
        }
        .wuxing-chart {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 120px;
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
        }
        .wuxing-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        .wuxing-bar-fill {
            width: 30px;
            background: linear-gradient(180deg, var(--gold) 0%, #ff9500 100%);
            border-radius: 8px 8px 0 0;
            transition: height 0.5s ease;
            min-height: 10px;
        }
        .wuxing-bar-label {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .horoscope-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.08) 0%, transparent 100%);
            border: 1px solid rgba(255,215,0,0.15);
        }
        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,215,0,0.5) 0%, transparent 100%);
        }
        .yi-ji-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .yi-ji-item.yi {
            border-left: 3px solid #22c55e;
        }
        .yi-ji-item.ji {
            border-left: 3px solid #ef4444;
        }
        .yi-ji-label {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .yi-ji-value {
            font-size: 14px;
            color: var(--text-primary);
        }
        .floating-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            padding: 10px 15px 25px;
            display: none;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }
        .loading {
            text-align: center;
            padding: 30px;
            color: var(--gold);
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,215,0,0.3);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .bazi-detail-section {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
        }
        .bazi-detail-title {
            font-size: 14px;
            color: var(--gold);
            margin-bottom: 10px;
            font-weight: 600;
        }
        .bazi-detail-content {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.8;
        }
        .wuxing-detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed var(--border-color);
        }
        .wuxing-detail-row:last-child {
            border-bottom: none;
        }
        .wuxing-detail-name {
            color: var(--text-secondary);
            font-size: 13px;
        }
        .wuxing-detail-value {
            color: var(--gold);
            font-weight: 500;
            font-size: 13px;
        }
        .rizhu-info {
            background: linear-gradient(135deg, rgba(255,215,0,0.1) 0%, transparent 100%);
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            border: 1px solid rgba(255,215,0,0.1);
        }
        .rizhu-title {
            font-size: 15px;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 10px;
        }
        .rizhu-content {
            font-size: 13px;
            color: var(--text-primary);
            line-height: 1.8;
        }
        .calendar-switch {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .calendar-option {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        .calendar-option.active {
            background: linear-gradient(135deg, var(--gold) 0%, #ff9500 100%);
            color: #0d1117;
            font-weight: 600;
            border-color: var(--gold);
        }
        .pillar-detail {
            margin-top: 12px;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .shishen-badge {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(255,215,0,0.15);
            border-radius: 10px;
            font-size: 11px;
            color: var(--gold);
            margin-right: 5px;
            margin-bottom: 3px;
        }
        .wuxing-analysis-card {
            margin-top: 15px;
        }
        .wuxing-summary {
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            margin-top: 10px;
            font-size: 13px;
            line-height: 1.8;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>八字命理大师</h1>
            <p>知命改运 · 趋吉避凶</p>
        </div>
        
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="showTab('home')">首页</div>
            <div class="nav-tab" onclick="showTab('bazi')">八字排盘</div>
            <div class="nav-tab" onclick="showTab('guagua')">卦象占卜</div>
            <div class="nav-tab" onclick="showTab('number')">号码分析</div>
        </div>
        
        <!-- 首页 -->
        <div id="home" class="tab-content active">
            <div class="today-luck">
                <div class="luck-item">
                    <div class="luck-value">88%</div>
                    <div class="luck-label">今日运势</div>
                </div>
                <div class="luck-item">
                    <div class="luck-value">★★★★</div>
                    <div class="luck-label">财运指数</div>
                </div>
                <div class="luck-item">
                    <div class="luck-value">★★★☆</div>
                    <div class="luck-label">感情指数</div>
                </div>
            </div>
            
            <div class="result-card horoscope-card">
                <div class="result-title">今日宜忌</div>
                <div class="result-content">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div>
                            <div class="section-title">宜</div>
                            <div class="yi-ji-item yi"><span class="yi-ji-label">出行</span><span class="yi-ji-value">✓</span></div>
                            <div class="yi-ji-item yi"><span class="yi-ji-label">交易</span><span class="yi-ji-value">✓</span></div>
                            <div class="yi-ji-item yi"><span class="yi-ji-label">祭祀</span><span class="yi-ji-value">✓</span></div>
                            <div class="yi-ji-item yi"><span class="yi-ji-label">祈福</span><span class="yi-ji-value">✓</span></div>
                        </div>
                        <div>
                            <div class="section-title">忌</div>
                            <div class="yi-ji-item ji"><span class="yi-ji-label">动土</span><span class="yi-ji-value">✗</span></div>
                            <div class="yi-ji-item ji"><span class="yi-ji-label">安葬</span><span class="yi-ji-value">✗</span></div>
                            <div class="yi-ji-item ji"><span class="yi-ji-label">破土</span><span class="yi-ji-value">✗</span></div>
                            <div class="yi-ji-item ji"><span class="yi-ji-label">开光</span><span class="yi-ji-value">✗</span></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="result-card">
                <div class="result-title">今日生肖运势</div>
                <div class="result-content">
                    <div style="display: grid; gap: 10px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span style="color: #22c55e; font-weight: 600;">吉：</span>
                            <span>鼠、龙、猴</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span style="color: var(--text-secondary); font-weight: 600;">平：</span>
                            <span>牛、虎、兔、蛇、马、羊、鸡、狗、猪</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span style="color: #ef4444; font-weight: 600;">凶：</span>
                            <span>无</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="result-card">
                <div class="result-title">五行旺度</div>
                <div class="wuxing-chart">
                    <div class="wuxing-bar"><div class="wuxing-bar-fill" style="height: 70%;"></div><div class="wuxing-bar-label">金</div></div>
                    <div class="wuxing-bar"><div class="wuxing-bar-fill" style="height: 85%;"></div><div class="wuxing-bar-label">木</div></div>
                    <div class="wuxing-bar"><div class="wuxing-bar-fill" style="height: 60%;"></div><div class="wuxing-bar-label">水</div></div>
                    <div class="wuxing-bar"><div class="wuxing-bar-fill" style="height: 90%;"></div><div class="wuxing-bar-label">火</div></div>
                    <div class="wuxing-bar"><div class="wuxing-bar-fill" style="height: 50%;"></div><div class="wuxing-bar-label">土</div></div>
                </div>
            </div>
            
            <div class="result-card">
                <div class="result-title">命理小知识</div>
                <div class="result-content">
                    <p style="font-size: 13px; color: var(--text-secondary); line-height: 1.8;">
                        <strong style="color: var(--gold);">八字</strong>是根据出生年月日时推算出来的四柱干支，每一柱由天干和地支组成，共八个字，故称八字。通过分析八字中五行的生克关系，可以推断一个人的性格、事业、财运、婚姻等方面的信息。
                    </p>
                </div>
            </div>
        </div>
        
        <!-- 八字排盘 -->
        <div id="bazi" class="tab-content">
            <div class="form-group">
                <label>选择性别</label>
                <select id="gender">
                    <option value="male">男</option>
                    <option value="female">女</option>
                </select>
            </div>
            <div class="form-group">
                <label>出生日期</label>
                <input type="date" id="birthDate" value="1990-01-01">
                <div class="calendar-switch">

        // 八字计算核心函数（完全按照电脑版逻辑）
        
        function getShichenIndex(hour, minute=0) {
            if (hour == 23 || (hour == 0 && minute < 60) || (hour == 1 && minute == 0)) {
                return 0;
            }
            if (hour >= 1 && hour < 3) return 1;
            if (hour >= 3 && hour < 5) return 2;
            if (hour >= 5 && hour < 7) return 3;
            if (hour >= 7 && hour < 9) return 4;
            if (hour >= 9 && hour < 11) return 5;
            if (hour >= 11 && hour < 13) return 6;
            if (hour >= 13 && hour < 15) return 7;
            if (hour >= 15 && hour < 17) return 8;
            if (hour >= 17 && hour < 19) return 9;
            if (hour >= 19 && hour < 21) return 10;
            if (hour >= 21 && hour < 23) return 11;
            return 0;
        }

        function getLichunDate(year) {
            return new Date(year, 1, 4);
        }

        function adjustYearForLichun(year, month, day) {
            var lichun = getLichunDate(year);
            var birthDate = new Date(year, month - 1, day);
            if (birthDate < lichun) {
                return year - 1;
            }
            return year;
        }

        function getGanZhiYear(year) {
            var ganIndex = (year - 4) % 10;
            var zhiIndex = (year - 4) % 12;
            return TIANGAN[ganIndex] + DIZHI[zhiIndex];
        }

        function getMonthZhiByJieqi(year, month, day) {
            var jieqiOrder = ["立春", "惊蛰", "清明", "立夏", "芒种", "小暑", "立秋", "白露", "寒露", "立冬", "大雪", "小寒"];
            var monthZhi = "丑";
            for (var i = 0; i < jieqiOrder.length; i++) {
                var jieqi = jieqiOrder[i];
                var m = JIEQI_DATES[jieqi][0];
                var d = JIEQI_DATES[jieqi][1];
                
                if (m == 1 && month != 1) {
                    continue;
                }
                
                if (month > m || (month == m && day >= d)) {
                    monthZhi = JIEQI_MONTH_ZHI[jieqi];
                }
            }
            return monthZhi;
        }

        function getGanZhiMonth(year, month, day) {
            var monthZhi = getMonthZhiByJieqi(year, month, day);
            var monthZhiIndex = (DIZHI.indexOf(monthZhi) - 2 + 12) % 12;
            var yearGanIndex = (year - 4) % 10;
            var startGanMap = {0:2, 5:2, 1:4, 6:4, 2:6, 7:6, 3:8, 8:8, 4:0, 9:0};
            var startGan = startGanMap[yearGanIndex];
            var monthGanIndex = (startGan + monthZhiIndex) % 10;
            return TIANGAN[monthGanIndex] + monthZhi;
        }

        function getGanZhiDay(year, month, day) {
            var baseDate = new Date(1970, 0, 1);
            var targetDate = new Date(year, month - 1, day);
            var daysDiff = Math.floor((targetDate - baseDate) / (1000 * 60 * 60 * 24));
            var baseGanIndex = 7;
            var baseZhiIndex = 5;
            var ganIndex = (baseGanIndex + daysDiff) % 10;
            var zhiIndex = (baseZhiIndex + daysDiff) % 12;
            return TIANGAN[ganIndex] + DIZHI[zhiIndex];
        }

        function getGanZhiHour(dayGan, hour) {
            var hourZhiIndex = getShichenIndex(hour);
            var dayGanIndex = TIANGAN.indexOf(dayGan);
            var startGanMap = {0:0, 5:0, 1:2, 6:2, 2:4, 7:4, 3:6, 8:6, 4:8, 9:8};
            var startGan = startGanMap[dayGanIndex];
            var hourGanIndex = (startGan + hourZhiIndex) % 10;
            return TIANGAN[hourGanIndex] + DIZHI[hourZhiIndex];
        }

        function lunarToSolar(lunarYear, lunarMonth, lunarDay, isLeap=false) {
            if (lunarYear < 1900 || lunarYear > 2100) {
                return [lunarYear, lunarMonth, lunarDay];
            }
            var sf = SPRING_FESTIVAL[lunarYear];
            var baseDate = new Date(lunarYear, sf[0] - 1, sf[1]);
            var monthDays, leapDays, leapMonth;
            if (LUNAR_MONTH_DATA[lunarYear]) {
                monthDays = LUNAR_MONTH_DATA[lunarYear][0];
                leapDays = LUNAR_MONTH_DATA[lunarYear][1];
                leapMonth = LUNAR_MONTH_DATA[lunarYear][2];
            } else {
                monthDays = [30, 29, 30, 29, 30, 29, 30, 29, 30, 29, 30, 29];
                leapDays = 0;
                leapMonth = 0;
            }
            var days = 0;
            for (var m = 1; m < lunarMonth; m++) {
                days += monthDays[m - 1];
                if (leapMonth == m) {
                    days += leapDays;
                }
            }
            if (isLeap) {
                days += monthDays[lunarMonth - 1];
            }
            days += lunarDay - 1;
            var resultDate = new Date(baseDate);
            resultDate.setDate(resultDate.getDate() + days);
            return [resultDate.getFullYear(), resultDate.getMonth() + 1, resultDate.getDate()];
        }

        function calculateBazi(year, month, day, hour, isLunar=false) {
            if (isLunar) {
                var solar = lunarToSolar(year, month, day);
                year = solar[0];
                month = solar[1];
                day = solar[2];
            }
            var baziYear = adjustYearForLichun(year, month, day);
            var yearGz = getGanZhiYear(baziYear);
            var monthGz = getGanZhiMonth(baziYear, month, day);
            var dayGz = getGanZhiDay(year, month, day);
            var hourGz = getGanZhiHour(dayGz[0], hour);
            return {
                year: yearGz,
                month: monthGz,
                day: dayGz,
                hour: hourGz,
                solarYear: year,
                solarMonth: month,
                solarDay: day,
                hourNum: hour,
                baziYear: baziYear
            };
        }

        function countWuxing(bazi) {
            var wuxingCount = {"金":0, "木":0, "水":0, "火":0, "土":0};
            for (var key in bazi) {
                if (key == "year" || key == "month" || key == "day" || key == "hour") {
                    var gz = bazi[key];
                    var gan = gz[0];
                    var zhi = gz[1];
                    wuxingCount[TIANGAN_WUXING[gan]]++;
                    wuxingCount[DIZHI_WUXING[zhi]]++;
                }
            }
            return wuxingCount;
        }

        function getRizhuWuxing(dayGz) {
            return TIANGAN_WUXING[dayGz[0]];
        }

        function calculateShishen(bazi) {
            var dayGan = bazi.day[0];
            var dayGanIndex = TIANGAN.indexOf(dayGan);
            var shishen = {};
            for (var key in bazi) {
                if (key == "year" || key == "month" || key == "day" || key == "hour") {
                    var gz = bazi[key];
                    var gan = gz[0];
                    var ganIndex = TIANGAN.indexOf(gan);
                    shishen[key] = {
                        gan: gan,
                        zhi: gz[1],
                        shishen: SHISHEN_RELATIONS[dayGanIndex][ganIndex],
                        wuxing: TIANGAN_WUXING[gan]
                    };
                }
            }
            return shishen;
        }

        function getShengxiao(year, month, day) {
            var adjustedYear = adjustYearForLichun(year, month, day);
            return SHENGXIAO[(adjustedYear - 4) % 12];
        }

        function getShishenCount(shishen) {
            var count = {};
            for (var key in shishen) {
                var name = shishen[key].shishen;
                count[name] = (count[name] || 0) + 1;
            }
            return count;
        }

        function getDayangong(bazi) {

        function getWuxingAnalysis(wuxing, rizhu) {
            var total = wuxing['金'] + wuxing['木'] + wuxing['水'] + wuxing['火'] + wuxing['土'];
            var avg = total / 5;
            var analysis = [];
            
            for (var w in wuxing) {
                if (wuxing[w] > avg + 1) analysis.push(w + '旺');
                else if (wuxing[w] < avg - 1) analysis.push(w + '弱');
            }
            
            if (analysis.length === 0) analysis.push('五行均衡');
            
            var relations = {
                "金": {"生":"水", "克":"木"},
                "木": {"生":"火", "克":"土"},
                "水": {"生":"木", "克":"火"},
                "火": {"生":"土", "克":"金"},
                "土": {"生":"金", "克":"水"}
            };
            
            analysis.push(`日主为${rizhu}，${rizhu}${relations[rizhu].生}为食神伤官，${rizhu}${relations[rizhu].克}为财星`);
            
            return analysis.join('，');

        function analyzeNumber() {
            var number = document.getElementById('numberInput').value;
            if (!number) {
                alert('请输入号码');
                return;
            }
            var sum = number.replace(/\D/g, '').split('').reduce((a,b) => a + parseInt(b), 0);
            var luck = (sum % 100) % 10;
            document.getElementById('numberResult').innerHTML = `<div class="result-card"><div class="result-title">号码分析</div><div class="number-analysis"><div class="number-row"><div class="number-label">号码数字和</div><div class="number-value">${sum}</div></div><div class="number-row"><div class="number-label">吉凶指数</div><div class="number-value">${getLuckLevel(luck)}</div></div><div class="number-row"><div class="number-label">数理寓意</div><div class="number-value">${getNumberMeaning(sum)}</div></div></div></div>`;
        }

        function getLuckLevel(luck) {
            if (luck >= 8) return '吉';
            if (luck >= 5) return '平';
            return '凶';
        }

        function getNumberMeaning(sum) {
            var meanings = {1:"太极之数，万物开泰", 2:"两仪之数，混沌未开", 3:"三才之数，天地人和", 4:"四象之数，待于生发", 5:"五行之数，循环相生", 6:"六爻之数，发展变化", 7:"七政之数，精悍严谨", 8:"八卦之数，乾坎艮震", 9:"大成之数，蕴涵凶险", 10:"终结之数，雪暗飘零"};
            return meanings[sum % 10] || `数理${sum}，自有定数`;
        }
