<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>八字命理大师</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; color: #fff; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .header { text-align: center; padding: 20px 0; }
        .header h1 { font-size: 24px; color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .header p { font-size: 12px; color: #aaa; margin-top: 5px; }
        .nav-tabs { display: flex; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 5px; margin-bottom: 15px; }
        .nav-tab { flex: 1; text-align: center; padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.3s; }
        .nav-tab.active { background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%); color: #1a1a2e; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; color: #ccc; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: none; border-radius: 8px; background: rgba(255,255,255,0.1); color: #fff; font-size: 16px; }
        .form-group input:focus, .form-group select:focus { outline: none; box-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%); color: #1a1a2e; }
        .btn-primary:active { transform: scale(0.98); }
        .result-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-top: 15px; }
        .result-title { font-size: 16px; font-weight: bold; color: #ffd700; margin-bottom: 10px; }
        .result-content { font-size: 14px; line-height: 1.8; color: #ddd; }
        .bazi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .bazi-cell { text-align: center; padding: 12px; background: rgba(255,255,255,0.1); border-radius: 8px; }
        .bazi-tian { font-size: 24px; font-weight: bold; color: #ffd700; }
        .bazi-di { font-size: 16px; color: #aaa; }
        .wuxing-tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-right: 5px; }
        .wuxing-tag.mu { background: #228B22; }
        .wuxing-tag.huo { background: #FF4500; }
        .wuxing-tag.tu { background: #DAA520; }
        .wuxing-tag.jin { background: #C0C0C0; }
        .wuxing-tag.shui { background: #1E90FF; }
        .guagua-container { text-align: center; padding: 20px; }
        .guagua-display { width: 200px; height: 200px; margin: 0 auto; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .guagua-symbol { font-size: 60px; color: #ffd700; }
        .today-luck { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .luck-item { text-align: center; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .luck-value { font-size: 20px; font-weight: bold; color: #ffd700; }
        .luck-label { font-size: 12px; color: #aaa; margin-top: 5px; }
        .number-analysis { margin-top: 15px; }
        .number-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .number-label { color: #aaa; }
        .number-value { color: #fff; }
        .shishen-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .shishen-table th, .shishen-table td { padding: 8px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 12px; }
        .shishen-table th { color: #ffd700; }
        .loading { text-align: center; padding: 20px; color: #ffd700; }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>八字命理大师</h1>
            <p>知命改运 · 趋吉避凶</p>
        </div>
        
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="showTab('home')">首页</div>
            <div class="nav-tab" onclick="showTab('bazi')">八字排盘</div>
            <div class="nav-tab" onclick="showTab('guagua')">卦象占卜</div>
            <div class="nav-tab" onclick="showTab('number')">号码分析</div>
        </div>
        
        <!-- 首页 -->
        <div id="home" class="tab-content active">
            <div class="today-luck">
                <div class="luck-item">
                    <div class="luck-value">88%</div>
                    <div class="luck-label">今日运势</div>
                </div>
                <div class="luck-item">
                    <div class="luck-value">★★★★</div>
                    <div class="luck-label">财运指数</div>
                </div>
                <div class="luck-item">
                    <div class="luck-value">★★★☆</div>
                    <div class="luck-label">感情指数</div>
                </div>
            </div>
            <div class="result-card">
                <div class="result-title">今日宜忌</div>
                <div class="result-content">
                    <p><strong>宜：</strong>出行、交易、祭祀、祈福、嫁娶</p>
                    <p><strong>忌：</strong>动土、安葬、破土、开光</p>
                </div>
            </div>
            <div class="result-card">
                <div class="result-title">今日生肖运势</div>
                <div class="result-content">
                    <p><strong>吉：</strong>鼠、龙、猴</p>
                    <p><strong>平：</strong>牛、虎、兔、蛇、马、羊、鸡、狗、猪</p>
                    <p><strong>凶：</strong>无</p>
                </div>
            </div>
        </div>
        
        <!-- 八字排盘 -->
        <div id="bazi" class="tab-content">
            <div class="form-group">
                <label>选择性别</label>
                <select id="gender">
                    <option value="male">男</option>
                    <option value="female">女</option>
                </select>
            </div>
            <div class="form-group">
                <label>出生日期</label>
                <input type="date" id="birthDate" value="1990-01-01">
            </div>
            <div class="form-group">
                <label>出生时辰</label>
                <select id="birthTime">
                    <option value="0">子时 (23:00-01:00)</option>
                    <option value="1">丑时 (01:00-03:00)</option>
                    <option value="2">寅时 (03:00-05:00)</option>
                    <option value="3">卯时 (05:00-07:00)</option>
                    <option value="4">辰时 (07:00-09:00)</option>
                    <option value="5">巳时 (09:00-11:00)</option>
                    <option value="6">午时 (11:00-13:00)</option>
                    <option value="7">未时 (13:00-15:00)</option>
                    <option value="8">申时 (15:00-17:00)</option>
                    <option value="9">酉时 (17:00-19:00)</option>
                    <option value="10">戌时 (19:00-21:00)</option>
                    <option value="11">亥时 (21:00-23:00)</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="calculateBazi()">开始排盘</button>
            <div id="baziResult"></div>
        </div>
        
        <!-- 卦象占卜 -->
        <div id="guagua" class="tab-content">
            <div class="guagua-container">
                <div class="guagua-display" onclick="randomGua()">
                    <div class="guagua-symbol">?</div>
                </div>
                <p style="margin-top: 15px; color: #ffd700;">点击卦象开始占卜</p>
            </div>
            <div id="guaResult"></div>
        </div>
        
        <!-- 号码分析 -->
        <div id="number" class="tab-content">
            <div class="form-group">
                <label>输入号码（手机号/车牌号）</label>
                <input type="text" id="numberInput" placeholder="请输入手机号或车牌号">
            </div>
            <button class="btn btn-primary" onclick="analyzeNumber()">开始分析</button>
            <div id="numberResult"></div>
        </div>
    </div>

    <script>
        // 命理数据
        const TIANGAN = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
        const DIZHI = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
        const TIANGAN_WUXING = {"甲":"木","乙":"木","丙":"火","丁":"火","戊":"土","己":"土","庚":"金","辛":"金","壬":"水","癸":"水"};
        const DIZHI_WUXING = {"子":"水","丑":"土","寅":"木","卯":"木","辰":"土","巳":"火","午":"火","未":"土","申":"金","酉":"金","戌":"土","亥":"水"};
        const SHENGXIAO = ["鼠", "牛", "虎", "兔", "龙", "蛇", "马", "羊", "猴", "鸡", "狗", "猪"];
        const NAYIN_WUXING = ["海中金", "炉中火", "大林木", "路旁土", "剑锋金", "山头火", "涧下水", "城头土", "白蜡金", "杨柳木", "泉中水", "屋上土", "霹雳火", "松柏木", "长流水", "沙中金", "山下火", "平地木", "壁上土", "金箔金", "覆灯火", "天河水", "大驿土", "钗钏金", "桑柘木", "大溪水", "沙中土", "天上火", "石榴木", "大海水"];
        
        const SHISHEN_RELATIONS = {
            0: {0:"比肩",1:"劫财",2:"食神",3:"伤官",4:"偏财",5:"正财",6:"七杀",7:"正官",8:"偏印",9:"正印"},
            1: {1:"比肩",0:"劫财",3:"食神",2:"伤官",5:"偏财",4:"正财",7:"七杀",6:"正官",9:"偏印",8:"正印"},
            2: {2:"比肩",3:"劫财",4:"食神",5:"伤官",6:"偏财",7:"正财",8:"七杀",9:"正官",0:"偏印",1:"正印"},
            3: {3:"比肩",2:"劫财",5:"食神",4:"伤官",7:"偏财",6:"正财",9:"七杀",8:"正官",1:"偏印",0:"正印"},
            4: {4:"比肩",5:"劫财",6:"食神",7:"伤官",8:"偏财",9:"正财",0:"七杀",1:"正官",2:"偏印",3:"正印"},
            5: {5:"比肩",4:"劫财",7:"食神",6:"伤官",9:"偏财",8:"正财",1:"七杀",0:"正官",3:"偏印",2:"正印"},
            6: {6:"比肩",7:"劫财",8:"食神",9:"伤官",0:"偏财",1:"正财",2:"七杀",3:"正官",4:"偏印",5:"正印"},
            7: {7:"比肩",6:"劫财",9:"食神",8:"伤官",1:"偏财",0:"正财",3:"七杀",2:"正官",5:"偏印",4:"正印"},
            8: {8:"比肩",9:"劫财",0:"食神",1:"伤官",2:"偏财",3:"正财",4:"七杀",5:"正官",6:"偏印",7:"正印"},
            9: {9:"比肩",8:"劫财",1:"食神",0:"伤官",3:"偏财",2:"正财",5:"七杀",4:"正官",7:"偏印",6:"正印"}
        };
        
        const GUA_DATA = {
            "乾": {"name":"乾为天","gua_ci":"元亨利贞。","interpret":"象征天，刚健有力。事业大吉，但需防盛极而衰。"},
            "坤": {"name":"坤为地","gua_ci":"元亨，利牝马之贞。","interpret":"象征地，柔顺包容。宜守不宜攻，以柔克刚。"},
            "屯": {"name":"水雷屯","gua_ci":"元亨利贞，勿用有攸往，利建侯。","interpret":"象征初生，充满艰难。宜守成，不宜冒进。"},
            "蒙": {"name":"山水蒙","gua_ci":"亨。匪我求童蒙，童蒙求我。","interpret":"象征启蒙，需要教导。虚心学习，可获成功。"},
            "需": {"name":"水天需","gua_ci":"有孚，光亨，贞吉。利涉大川。","interpret":"象征等待，需要耐心。待机而动，终能成功。"},
            "讼": {"name":"天水讼","gua_ci":"有孚，窒惕，中吉，终凶。","interpret":"象征争讼，宜和不宜争。退一步海阔天空。"},
            "师": {"name":"地水师","gua_ci":"贞，丈人吉，无咎。","interpret":"象征军队，需要纪律。用人得当，可成大事。"},
            "比": {"name":"水地比","gua_ci":"吉。原筮元永贞，无咎。","interpret":"象征亲比，团结合作。诚信待人，可得助力。"}
        };
        
        const GUA_SYMBOLS = ["乾", "坤", "屯", "蒙", "需", "讼", "师", "比"];

        function showTab(tabId) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelector(`.nav-tab[onclick="showTab('${tabId}')"]`).classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        function getYearGanZhi(year) {
            const ganIndex = (year - 4) % 10;
            const zhiIndex = (year - 4) % 12;
            return { gan: TIANGAN[ganIndex], zhi: DIZHI[zhiIndex] };
        }

        function getMonthGanZhi(year, month) {
            const yearGanIndex = (year - 4) % 10;
            const monthZhiIndex = (month + 1) % 12;
            const monthGanIndex = (yearGanIndex * 2 + month + 1) % 10;
            return { gan: TIANGAN[monthGanIndex], zhi: DIZHI[monthZhiIndex] };
        }

        function getDayGanZhi(date) {
            const baseDate = new Date('1900-01-01');
            const diff = Math.floor((date - baseDate) / (1000 * 60 * 60 * 24));
            const ganIndex = (diff + 9) % 10;
            const zhiIndex = (diff + 1) % 12;
            return { gan: TIANGAN[ganIndex], zhi: DIZHI[zhiIndex] };
        }

        function getTimeGanZhi(year, month, day, hour) {
            const dayGan = getDayGanZhi(new Date(year, month-1, day)).gan;
            const dayGanIndex = TIANGAN.indexOf(dayGan);
            const hourIndex = Math.floor(hour / 2);
            const timeGanIndex = (dayGanIndex * 2 + hourIndex) % 10;
            return { gan: TIANGAN[timeGanIndex], zhi: DIZHI[hourIndex] };
        }

        function getNayin(year) {
            const index = (year - 1984) % 30;
            return NAYIN_WUXING[index < 0 ? index + 30 : index];
        }

        function calculateBazi() {
            const gender = document.getElementById('gender').value;
            const birthDate = document.getElementById('birthDate').value;
            const timeIndex = parseInt(document.getElementById('birthTime').value);
            
            const [year, month, day] = birthDate.split('-').map(Number);
            const hour = timeIndex * 2;
            
            const yearGZ = getYearGanZhi(year);
            const monthGZ = getMonthGanZhi(year, month);
            const dayGZ = getDayGanZhi(new Date(year, month-1, day));
            const timeGZ = getTimeGanZhi(year, month, day, hour);
            
            const bazi = [yearGZ, monthGZ, dayGZ, timeGZ];
            const nayin = getNayin(year);
            const shengxiao = SHENGXIAO[(year - 4) % 12];
            
            const dayGanIndex = TIANGAN.indexOf(dayGZ.gan);
            const shishen = [];
            bazi.forEach(item => {
                const ganIndex = TIANGAN.indexOf(item.gan);
                shishen.push(SHISHEN_RELATIONS[dayGanIndex][ganIndex]);
            });
            
            let result = '<div class="result-card"><div class="result-title">八字排盘结果</div>';
            result += '<div class="bazi-grid">';
            bazi.forEach((item, i) => {
                const wuxing = TIANGAN_WUXING[item.gan];
                const wuxingClass = {'木':'mu','火':'huo','土':'tu','金':'jin','水':'shui'}[wuxing];
                result += `<div class="bazi-cell"><div class="bazi-tian">${item.gan}</div><div class="bazi-di">${item.zhi}</div><span class="wuxing-tag ${wuxingClass}">${wuxing}</span></div>`;
            });
            result += '</div>';
            result += `<p style="margin-top: 15px;"><strong>纳音：</strong>${nayin}</p>`;
            result += `<p><strong>生肖：</strong>${shengxiao}</p>`;
            result += '<div class="result-title" style="margin-top: 15px;">十神分析</div>';
            result += '<table class="shishen-table"><tr><th>位置</th><th>天干</th><th>十神</th></tr>';
            const positions = ['年柱', '月柱', '日柱', '时柱'];
            bazi.forEach((item, i) => {
                result += `<tr><td>${positions[i]}</td><td>${item.gan}</td><td>${shishen[i]}</td></tr>`;
            });
            result += '</table></div>';
            
            document.getElementById('baziResult').innerHTML = result;
        }

        function randomGua() {
            const gua = GUA_SYMBOLS[Math.floor(Math.random() * GUA_SYMBOLS.length)];
            const data = GUA_DATA[gua];
            
            let result = '<div class="guagua-container">';
            result += `<div class="guagua-display"><div class="guagua-symbol">${gua}</div></div>`;
            result += `<p style="margin-top: 15px; color: #ffd700;">${data.name}</p>`;
            result += '</div>';
            result += '<div class="result-card"><div class="result-title">卦辞</div>';
            result += `<div class="result-content"><p>${data.gua_ci}</p></div></div>`;
            result += '<div class="result-card"><div class="result-title">解读</div>';
            result += `<div class="result-content"><p>${data.interpret}</p></div></div>`;
            
            document.getElementById('guaResult').innerHTML = result;
        }

        function analyzeNumber() {
            const input = document.getElementById('numberInput').value;
            const numbers = input.replace(/\D/g, '');
            
            if (!numbers) {
                alert('请输入有效的号码');
                return;
            }
            
            const wuxingCount = {'金':0,'木':0,'水':0,'火':0,'土':0};
            const numWuxing = {'0':'土','1':'金','2':'水','3':'木','4':'木','5':'土','6':'火','7':'火','8':'土','9':'金'};
            
            let sum = 0;
            for (const num of numbers) {
                const wuxing = numWuxing[num];
                wuxingCount[wuxing]++;
                sum += parseInt(num);
            }
            
            let dominantWuxing = '';
            let maxCount = 0;
            for (const [wuxing, count] of Object.entries(wuxingCount)) {
                if (count > maxCount) {
                    maxCount = count;
                    dominantWuxing = wuxing;
                }
            }
            
            const luckyNum = sum % 9 || 9;
            
            let result = '<div class="result-card"><div class="result-title">号码分析结果</div>';
            result += '<div class="number-analysis">';
            result += `<div class="number-row"><span class="number-label">号码长度</span><span class="number-value">${numbers.length}位</span></div>`;
            result += `<div class="number-row"><span class="number-label">数字总和</span><span class="number-value">${sum}</span></div>`;
            result += `<div class="number-row"><span class="number-label">幸运数</span><span class="number-value">${luckyNum}</span></div>`;
            result += `<div class="number-row"><span class="number-label">主导五行</span><span class="number-value">${dominantWuxing}</span></div>`;
            result += '</div></div>';
            
            result += '<div class="result-card"><div class="result-title">五行分布</div>';
            result += '<div class="number-analysis">';
            for (const [wuxing, count] of Object.entries(wuxingCount)) {
                const wuxingClass = {'木':'mu','火':'huo','土':'tu','金':'jin','水':'shui'}[wuxing];
                const percentage = ((count / numbers.length) * 100).toFixed(1);
                result += `<div class="number-row"><span class="number-label"><span class="wuxing-tag ${wuxingClass}">${wuxing}</span></span><span class="number-value">${count}次 (${percentage}%)</span></div>`;
            }
            result += '</div></div>';
            
            const wuxingMeaning = {
                '金': '代表财富、权力、决断力。号码中金多者，财运较好，做事果断。',
                '木': '代表生机、成长、智慧。号码中木多者，思维敏捷，事业蒸蒸日上。',
                '水': '代表智慧、流动、变通。号码中水多者，头脑灵活，适应能力强。',
                '火': '代表热情、活力、光明。号码中火多者，性格开朗，事业有成。',
                '土': '代表稳重、诚实、守信。号码中土多者，为人可靠，财运稳定。'
            };
            
            result += '<div class="result-card"><div class="result-title">命理解读</div>';
            result += `<div class="result-content"><p>${wuxingMeaning[dominantWuxing]}</p></div></div>`;
            
            document.getElementById('numberResult').innerHTML = result;
        }
    </script>
</body>
</html>
