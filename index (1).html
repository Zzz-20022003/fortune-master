<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>八字命理大师</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-decoration">
                <span class="deco-line"></span>
                <span class="deco-symbol">☯</span>
                <span class="deco-line"></span>
            </div>
            <h1>八 字 命 理 大 师</h1>
            <p class="subtitle">传承千年智慧 · 解读人生密码</p>
        </header>
        
        <main class="content" id="mainContent">
            <!-- 各模块内容会动态切换 -->
        </main>
        
        <nav class="bottomNav">
            <div class="nav-item active" data-tab="bazi">
                <span class="nav-icon">命</span>
                <span class="nav-text">八字命理</span>
            </div>
            <div class="nav-item" data-tab="hehun">
                <span class="nav-icon">缘</span>
                <span class="nav-text">八字合婚</span>
            </div>
            <div class="nav-item" data-tab="guaxiang">
                <span class="nav-icon">卦</span>
                <span class="nav-text">卦象占卜</span>
            </div>
            <div class="nav-item" data-tab="haoma">
                <span class="nav-icon">数</span>
                <span class="nav-text">号码吉凶</span>
            </div>
            <div class="nav-item" data-tab="meng">
                <span class="nav-icon">梦</span>
                <span class="nav-text">周公解梦</span>
            </div>
            <div class="nav-item" data-tab="shuyu">
                <span class="nav-icon">典</span>
                <span class="nav-text">术语解释</span>
            </div>
        </nav>
    </div>
    
    <!-- 模板：八字命理 -->
    <template id="tpl-bazi">
        <div class="module bazi-module">
            <section class="input-section">
                <h2 class="section-title"><span class="title-icon">☰</span>基本信息</h2>
                <div class="form-group">
                    <label class="form-label">姓名</label>
                    <input type="text" class="form-input" id="bazi-name" placeholder="请输入您的姓名" maxlength="10">
                </div>
                <div class="form-group">
                    <label class="form-label">性别</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="bazi-gender" value="male" checked>
                            <span class="radio-custom"></span>
                            <span class="radio-text">男</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="bazi-gender" value="female">
                            <span class="radio-custom"></span>
                            <span class="radio-text">女</span>
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">出生日期</label>
                    <div class="datetime-inputs">
                        <select class="form-select" id="bazi-year"></select>
                        <span class="date-separator">年</span>
                        <select class="form-select" id="bazi-month"></select>
                        <span class="date-separator">月</span>
                        <select class="form-select" id="bazi-day"></select>
                        <span class="date-separator">日</span>
                    </div>
                    <div class="time-inputs">
                        <select class="form-select" id="bazi-hour"></select>
                        <span class="date-separator">时</span>
                        <select class="form-select" id="bazi-minute"></select>
                        <span class="date-separator">分</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">出生时辰</label>
                    <select class="form-select full-width" id="bazi-shichen">
                        <option value="">请选择出生时辰</option>
                        <option value="子时">子时 (23:00-01:00)</option>
                        <option value="丑时">丑时 (01:00-03:00)</option>
                        <option value="寅时">寅时 (03:00-05:00)</option>
                        <option value="卯时">卯时 (05:00-07:00)</option>
                        <option value="辰时">辰时 (07:00-09:00)</option>
                        <option value="巳时">巳时 (09:00-11:00)</option>
                        <option value="午时">午时 (11:00-13:00)</option>
                        <option value="未时">未时 (13:00-15:00)</option>
                        <option value="申时">申时 (15:00-17:00)</option>
                        <option value="酉时">酉时 (17:00-19:00)</option>
                        <option value="戌时">戌时 (19:00-21:00)</option>
                        <option value="亥时">亥时 (21:00-23:00)</option>
                    </select>
                </div>
                <button class="btn btn-primary" id="bazi-calculate">
                    <span class="btn-icon">☯</span>
                    开始测算
                </button>
            </section>
            
            <section class="result-section" id="bazi-result" style="display: none;">
                <div class="result-header">
                    <h3 class="result-title">命盘分析结果</h3>
                    <p class="result-subtitle" id="bazi-result-name"></p>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">☰</span>四柱八字</h4>
                    <div class="bazi-pillars" id="bazi-pillars"></div>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">☆</span>五行分布</h4>
                    <div class="wuxing-chart" id="wuxing-chart"></div>
                    <div class="wuxing-list" id="wuxing-list"></div>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">⚖</span>八字强弱分析</h4>
                    <div class="analysis-content" id="bazi-strength"></div>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">详</span>详细分析</h4>
                    <div class="detail-analysis" id="detail-analysis"></div>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">运</span>流年分析</h4>
                    <div class="liunian-analysis" id="liunian-analysis"></div>
                </div>
                
                <div class="result-card advice-card">
                    <h4 class="card-title"><span class="card-icon">✦</span>开运转运建议</h4>
                    <div class="advice-content" id="advice-content"></div>
                </div>
                
                <button class="btn btn-secondary btn-restart" onclick="app.restart('bazi')">
                    重新测算
                </button>
            </section>
        </div>
    </template>
    
    <!-- 模板：八字合婚 -->
    <template id="tpl-hehun">
        <div class="module hehun-module">
            <section class="input-section">
                <div class="hehun-info">
                    <p class="info-text">输入双方信息，解读婚姻缘分密码</p>
                </div>
                
                <div class="hehun-inputs">
                    <div class="person-input">
                        <div class="person-header male">
                            <span class="person-icon">乾</span>
                            <span class="person-label">男方信息</span>
                        </div>
                        <div class="form-group">
                            <input type="text" class="form-input" id="hehun-male-name" placeholder="男方姓名" maxlength="10">
                        </div>
                        <div class="form-group">
                            <select class="form-select" id="hehun-male-year"></select>
                            <span class="date-separator">年</span>
                            <select class="form-select" id="hehun-male-month"></select>
                            <span class="date-separator">月</span>
                            <select class="form-select" id="hehun-male-day"></select>
                            <span class="date-separator">日</span>
                        </div>
                    </div>
                    
                    <div class="hehun-divider">
                        <span class="divider-symbol">☯</span>
                        <span class="divider-text">合</span>
                    </div>
                    
                    <div class="person-input">
                        <div class="person-header female">
                            <span class="person-icon">坤</span>
                            <span class="person-label">女方信息</span>
                        </div>
                        <div class="form-group">
                            <input type="text" class="form-input" id="hehun-female-name" placeholder="女方姓名" maxlength="10">
                        </div>
                        <div class="form-group">
                            <select class="form-select" id="hehun-female-year"></select>
                            <span class="date-separator">年</span>
                            <select class="form-select" id="hehun-female-month"></select>
                            <span class="date-separator">月</span>
                            <select class="form-select" id="hehun-female-day"></select>
                            <span class="date-separator">日</span>
                        </div>
                    </div>
                </div>
                
                <button class="btn btn-primary" id="hehun-calculate">
                    <span class="btn-icon">☯</span>
                    合婚测算
                </button>
            </section>
            
            <section class="result-section" id="hehun-result" style="display: none;">
                <div class="result-header">
                    <h3 class="result-title">合婚分析结果</h3>
                    <p class="result-subtitle" id="hehun-result-title"></p>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">☰</span>双方八字展示</h4>
                    <div class="hehun-bazi-display" id="hehun-bazi"></div>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">生</span>生肖配对分析</h4>
                    <div class="analysis-content" id="hehun-shengxiao"></div>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">☆</span>五行互补分析</h4>
                    <div class="analysis-content" id="hehun-wuxing"></div>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">☯</span>日主关系分析</h4>
                    <div class="analysis-content" id="hehun-rizhu"></div>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">±</span>矛盾与优势分析</h4>
                    <div class="conflict-analysis" id="hehun-conflict"></div>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">年</span>流年分析</h4>
                    <div class="liunian-analysis" id="hehun-liunian"></div>
                </div>
                
                <div class="result-card advice-card">
                    <h4 class="card-title"><span class="card-icon">✦</span>合婚建议</h4>
                    <div class="advice-content" id="hehun-advice"></div>
                </div>
                
                <button class="btn btn-secondary btn-restart" onclick="app.restart('hehun')">
                    重新测算
                </button>
            </section>
        </div>
    </template>
    
    <!-- 模板：卦象占卜 -->
    <template id="tpl-guaxiang">
        <div class="module guaxiang-module">
            <section class="input-section">
                <h2 class="section-title"><span class="title-icon">☰</span>起卦设置</h2>
                <div class="form-group">
                    <label class="form-label">起卦方式</label>
                    <div class="option-buttons">
                        <label class="option-btn active">
                            <input type="radio" name="guaxiang-method" value="random" checked>
                            <span>随机起卦</span>
                        </label>
                        <label class="option-btn">
                            <input type="radio" name="guaxiang-method" value="coins">
                            <span>三枚硬币</span>
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">动画风格</label>
                    <div class="option-buttons animation-options">
                        <label class="option-btn active">
                            <input type="radio" name="guaxiang-animation" value="rotate" checked>
                            <span>旋转</span>
                        </label>
                        <label class="option-btn">
                            <input type="radio" name="guaxiang-animation" value="flip">
                            <span>铜钱翻转</span>
                        </label>
                        <label class="option-btn">
                            <input type="radio" name="guaxiang-animation" value="sparkle">
                            <span>星空闪烁</span>
                        </label>
                        <label class="option-btn">
                            <input type="radio" name="guaxiang-animation" value="fade">
                            <span>简约渐显</span>
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">所问之事</label>
                    <textarea class="form-textarea" id="guaxiang-question" placeholder="请输入您想问的事情，如：事业发展、感情姻缘、财运投资等..." maxlength="200"></textarea>
                </div>
                <button class="btn btn-primary" id="guaxiang-start">
                    <span class="btn-icon">☯</span>
                    起卦
                </button>
            </section>
            
            <section class="animation-section" id="guaxiang-animation" style="display: none;">
                <div class="animation-container">
                    <div class="gua-display" id="gua-symbol">
                        <div class="gua-inner"></div>
                    </div>
                    <p class="animation-text" id="animation-text">心诚则灵...</p>
                    <button class="btn btn-stop" id="guaxiang-stop">停止</button>
                </div>
            </section>
            
            <section class="result-section" id="guaxiang-result" style="display: none;">
                <div class="result-header">
                    <h3 class="result-title">卦象解读</h3>
                    <p class="result-subtitle" id="guaxiang-result-question"></p>
                </div>
                
                <div class="result-card gua-card">
                    <div class="gua-visual" id="gua-visual"></div>
                    <div class="gua-info">
                        <h4 class="gua-name" id="gua-name"></h4>
                        <p class="gua-original" id="gua-original"></p>
                    </div>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">卦</span>卦辞</h4>
                    <div class="analysis-content" id="guaxiang-guaci"></div>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">爻</span>六爻详解</h4>
                    <div class="yao-list" id="guaxiang-yao"></div>
                </div>
                
                <div class="result-card advice-card">
                    <h4 class="card-title"><span class="card-icon">解</span>针对您的问题</h4>
                    <div class="advice-content" id="guaxiang-answer"></div>
                </div>
                
                <button class="btn btn-secondary btn-restart" onclick="app.restart('guaxiang')">
                    重新占卜
                </button>
            </section>
        </div>
    </template>
    
    <!-- 模板：号码吉凶 -->
    <template id="tpl-haoma">
        <div class="module haoma-module">
            <section class="input-section">
                <h2 class="section-title"><span class="title-icon">☰</span>手机号码分析</h2>
                <div class="haoma-intro">
                    <p>手机号码蕴含着数字能量，影响着您的运势走向</p>
                </div>
                <div class="form-group">
                    <label class="form-label">手机号码</label>
                    <input type="tel" class="form-input haoma-input" id="haoma-number" placeholder="请输入11位手机号码" maxlength="11">
                    <p class="form-hint">仅支持中国大陆手机号码</p>
                </div>
                <button class="btn btn-primary" id="haoma-calculate">
                    <span class="btn-icon">☯</span>
                    深度分析
                </button>
            </section>
            
            <section class="result-section" id="haoma-result" style="display: none;">
                <div class="result-header">
                    <h3 class="result-title">号码分析结果</h3>
                    <p class="result-subtitle" id="haoma-result-number"></p>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">数</span>81数理分析</h4>
                    <div class="number-display" id="number-display"></div>
                    <div class="analysis-content" id="haoma-math"></div>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">能</span>数字能量</h4>
                    <div class="energy-chart" id="energy-chart"></div>
                    <div class="analysis-content" id="haoma-energy"></div>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">☆</span>五行分布</h4>
                    <div class="wuxing-chart" id="haoma-wuxing"></div>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">评</span>综合评分</h4>
                    <div class="score-display" id="score-display"></div>
                    <div class="score-details" id="score-details"></div>
                </div>
                
                <div class="result-card advice-card">
                    <h4 class="card-title"><span class="card-icon">✦</span>改运建议</h4>
                    <div class="advice-content" id="haoma-advice"></div>
                </div>
                
                <button class="btn btn-secondary btn-restart" onclick="app.restart('haoma')">
                    重新分析
                </button>
            </section>
        </div>
    </template>
    
    <!-- 模板：周公解梦 -->
    <template id="tpl-meng">
        <div class="module meng-module">
            <section class="input-section">
                <h2 class="section-title"><span class="title-icon">☰</span>梦境解析</h2>
                <div class="meng-intro">
                    <p>日有所思，夜有所梦。解析您的梦境，窥探潜意识密码</p>
                </div>
                <div class="form-group">
                    <label class="form-label">梦境描述</label>
                    <textarea class="form-textarea" id="meng-description" placeholder="请详细描述您的梦境内容，如梦到的场景、人物、发生的事情等..." maxlength="500"></textarea>
                    <p class="form-hint">描述越详细，解梦越准确</p>
                </div>
                <button class="btn btn-primary" id="meng-calculate">
                    <span class="btn-icon">☯</span>
                    开始解梦
                </button>
            </section>
            
            <section class="result-section" id="meng-result" style="display: none;">
                <div class="result-header">
                    <h3 class="result-title">梦境解读</h3>
                    <p class="result-subtitle" id="meng-result-title">根据您描述的梦境</p>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">解</span>梦境解释</h4>
                    <div class="analysis-content" id="meng-explanation"></div>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">吉</span>吉凶判断</h4>
                    <div class="luck-indicator" id="luck-indicator"></div>
                </div>
                
                <div class="result-card">
                    <h4 class="card-title"><span class="card-icon">综</span>综合分析</h4>
                    <div class="analysis-content" id="meng-analysis"></div>
                </div>
                
                <div class="result-card advice-card">
                    <h4 class="card-title"><span class="card-icon">✦</span>近期运势提示</h4>
                    <div class="advice-content" id="meng-advice"></div>
                </div>
                
                <button class="btn btn-secondary btn-restart" onclick="app.restart('meng')">
                    重新解梦
                </button>
            </section>
        </div>
    </template>
    
    <!-- 模板：术语解释 -->
    <template id="tpl-shuyu">
        <div class="module shuyu-module">
            <section class="input-section">
                <h2 class="section-title"><span class="title-icon">☰</span>命理术语</h2>
                <div class="form-group">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" class="form-input" id="shuyu-search" placeholder="搜索术语...">
                    </div>
                </div>
            </section>
            
            <section class="terms-section">
                <div class="terms-list" id="terms-list"></div>
            </section>
            
            <section class="term-detail" id="term-detail" style="display: none;">
                <div class="detail-header">
                    <button class="btn-back" onclick="app.closeTermDetail()">返回</button>
                    <h3 class="detail-title" id="term-detail-title"></h3>
                </div>
                <div class="detail-content" id="term-detail-content"></div>
            </section>
        </div>
    </template>
    
    <script src="app.js"></script>
</body>
</html>
